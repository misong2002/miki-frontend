<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miki Live2D Chat</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #eef3f9 0%, #dfe9f3 100%);
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      color: #223;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: row;
    }

    /* 左侧聊天区 */
    #chat-panel {
      width: 42%;
      min-width: 360px;
      max-width: 560px;
      height: 100%;
      padding: 24px 20px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(8px);
      border-right: 1px solid rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }

    #title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    #subtitle {
      font-size: 14px;
      color: #667;
      margin-bottom: 4px;
    }

    .box-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #334;
    }

    .display-box {
      background: #f8fbff;
      border: 1px solid #d8e2ee;
      border-radius: 14px;
      padding: 14px;
      min-height: 120px;
      white-space: pre-wrap;
      overflow-y: auto;
      line-height: 1.6;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.03);
    }

    #user-display {
      min-height: 90px;
      max-height: 140px;
    }

    #llm-display {
      flex: 1;
      min-height: 180px;
    }

    #input-area {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #user-input {
      width: 100%;
      min-height: 100px;
      resize: none;
      border: 1px solid #cfd9e6;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
      background: white;
      line-height: 1.6;
    }

    #user-input:focus {
      border-color: #7aa7d9;
      box-shadow: 0 0 0 3px rgba(122, 167, 217, 0.16);
    }

    #btn-row {
      display: flex;
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    #send-btn {
      background: #4a6fa5;
      color: white;
    }

    #send-btn:hover {
      background: #3d5f90;
    }

    #clear-btn {
      background: #e8eef5;
      color: #334;
    }

    #clear-btn:hover {
      background: #dbe5ef;
    }

    #status {
      font-size: 13px;
      color: #667;
      min-height: 18px;
    }

    /* 右侧模型区 */
    #stage-panel {
      flex: 1;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    #live2d-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #model-info {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 10;
      background: rgba(255,255,255,0.90);
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.10);
      font-size: 13px;
      color: #445;
      max-width: 320px;
    }

    @media (max-width: 900px) {
      #app {
        flex-direction: column;
      }

      #chat-panel {
        width: 100%;
        max-width: none;
        height: 48%;
        min-width: 0;
        border-right: none;
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      }

      #stage-panel {
        height: 52%;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <section id="chat-panel">
      <div>
        <div id="title">Miki Assistant</div>
        <div id="subtitle">左边聊天，右边固定显示 Live2D 模型</div>
      </div>

      <div>
        <div class="box-title">用户输入</div>
        <div id="user-display" class="display-box">（这里显示最近一次用户发送的内容）</div>
      </div>

      <div style="display:flex; flex-direction:column; min-height:0; flex:1;">
        <div class="box-title">LLM 输出</div>
        <div id="llm-display" class="display-box">（这里显示模型回复）</div>
      </div>

      <div id="input-area">
        <textarea id="user-input" placeholder="输入你想问的问题，比如：请解释一下CCQE二维微分截面的变量关系"></textarea>
        <div id="btn-row">
          <button id="send-btn">发送</button>
          <button id="clear-btn">清空</button>
        </div>
        <div id="status">状态：等待输入</div>
      </div>
    </section>

    <section id="stage-panel">
      <canvas id="live2d-canvas"></canvas>
      <div id="model-info">
        <div><strong>模型：</strong>miki_uniform</div>
        <div><strong>路径：</strong>model/miki_uniform.model3.json</div>
        <div><strong>行为：</strong>固定位置显示，不允许拖拽</div>
      </div>
    </section>
  </div>

  <!-- PixiJS v6 -->
  <script src="https://unpkg.com/pixi.js@6/dist/browser/pixi.min.js"></script>
  <!-- 本地 Cubism Core -->
  <script src="./libs/live2dcubismcore.min.js"></script>
  <!-- Cubism 4 bundle -->
  <script src="https://unpkg.com/pixi-live2d-display/dist/cubism4.min.js"></script>

  <script>
    window.PIXI = PIXI;

    const MODEL_PATH = "model/miki_uniform.model3.json";

    let app = null;
    let model = null;

    const canvas = document.getElementById("live2d-canvas");
    const userInput = document.getElementById("user-input");
    const userDisplay = document.getElementById("user-display");
    const llmDisplay = document.getElementById("llm-display");
    const sendBtn = document.getElementById("send-btn");
    const clearBtn = document.getElementById("clear-btn");
    const statusEl = document.getElementById("status");
    const stagePanel = document.getElementById("stage-panel");

    function setStatus(text) {
      statusEl.textContent = "状态：" + text;
    }

    function checkEnvironment() {
      if (!canvas) {
        throw new Error("没有找到 canvas：#live2d-canvas");
      }
      if (!window.PIXI) {
        throw new Error("PIXI 未加载成功");
      }
      if (!window.Live2DCubismCore) {
        throw new Error("Live2DCubismCore 未加载成功");
      }
      if (!PIXI.live2d || !PIXI.live2d.Live2DModel) {
        throw new Error("PIXI.live2d.Live2DModel 未加载成功");
      }
    }

    function positionModelFixed() {
      if (!app || !model) return;

      const w = app.renderer.width;
      const h = app.renderer.height;

      const bounds = model.getLocalBounds();
      const mw = Math.max(bounds.width, 1);
      const mh = Math.max(bounds.height, 1);

      // 固定缩放：让模型占右侧区域较大部分
      const scale = Math.min((w * 0.6) / mw, (h *1.0) / mh);

      model.scale.set(scale);

      // 固定在右侧偏中下
      model.x = w * 0.3;
      model.y = h * 0.5;
    }

    async function initLive2D() {
      checkEnvironment();

      app = new PIXI.Application({
        view: canvas,
        autoStart: true,
        resizeTo: stagePanel,
        backgroundAlpha: 0,
        antialias: true
      });

      model = await PIXI.live2d.Live2DModel.from(MODEL_PATH, {
        autoInteract: false
      });

      model.anchor.set(0.5, 0.5);

      // 不开启拖拽，不绑定 pointer 事件
      model.interactive = false;

      app.stage.addChild(model);
      positionModelFixed();

      window.addEventListener("resize", () => {
        positionModelFixed();
      });
    }

    async function callLLM(userText) {
      // 这里默认请求你自己的后端
      // 你的后端再去调用真正的 LLM API
      const response = await fetch("http://localhost:5000/api/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: userText
        })
      });

      if (!response.ok) {
        throw new Error(`接口请求失败: ${response.status} ${response.statusText}`);
      }

      const data = await response.json();

      // 约定后端返回格式:
      // { "reply": "..." }
      if (!data.reply) {
        throw new Error("接口返回中缺少 reply 字段");
      }

      return data.reply;
    }

    async function handleSend() {
      const text = userInput.value.trim();
      if (!text) {
        setStatus("请输入内容");
        return;
      }

      userDisplay.textContent = text;
      llmDisplay.textContent = "正在思考...";
      setStatus("正在请求 LLM");
      sendBtn.disabled = true;

      try {
        const reply = await callLLM(text);
        llmDisplay.textContent = reply;
        setStatus("回复完成");
      } catch (err) {
        console.error(err);
        llmDisplay.textContent = `请求失败：${err.message}`;
        setStatus("请求失败");
      } finally {
        sendBtn.disabled = false;
      }
    }

    function handleClear() {
      userInput.value = "";
      userDisplay.textContent = "（这里显示最近一次用户发送的内容）";
      llmDisplay.textContent = "（这里显示模型回复）";
      setStatus("已清空");
    }

    window.addEventListener("DOMContentLoaded", async () => {
      try {
        setStatus("初始化 Live2D");
        await initLive2D();
        setStatus("等待输入");
      } catch (err) {
        console.error(err);
        setStatus("初始化失败");
        llmDisplay.textContent = "Live2D 初始化失败：" + err.message;
      }
    });

    sendBtn.addEventListener("click", handleSend);
    clearBtn.addEventListener("click", handleClear);

    userInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        handleSend();
      }
    });
  </script>
</body>
</html>
